<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge Frame Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #1A1210; --fg: #F5E6D3; --gold: #D4A04A; --muted: #A69080; --serif: 'Playfair Display', serif; --sans: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--fg); font-family: var(--sans); padding: 28px 20px 64px; }
    h1 { font-family: var(--serif); font-size: 20px; color: var(--gold); margin-bottom: 4px; }
    .sub { font-size: 11px; color: var(--muted); margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 36px 16px; }
    .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .frame { position: relative; width: 108px; height: 108px; }
    .frame > svg { position: absolute; top: 0; left: 0; width: 108px; height: 108px; overflow: visible; }
    .avatar { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 72px; height: 72px; border-radius: 50%; background: #2e221a; display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 28px; font-weight: 600; color: var(--fg); z-index: 10; }
    .name { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }
    .divider { margin: 36px 0 28px; border: none; border-top: 1px solid rgba(255,255,255,0.08); }
    .founder-label { font-family: var(--serif); font-size: 13px; color: var(--gold); text-align: center; margin-bottom: 24px; letter-spacing: 0.08em; }
  </style>
</head>
<body>
<h1>Badge Frames v5</h1>
<p class="sub">Partner leaves removed · Founder redrawn (Opus X 25 inspired)</p>

<div class="grid">

  <!-- 1. BETA TESTER -->
  <div class="cell">
    <div class="frame">
      <svg viewBox="0 0 108 108" fill="none">
        <defs>
          <linearGradient id="betaG" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#818CF8"/><stop offset="100%" stop-color="#C084FC"/></linearGradient>
          <filter id="bg"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <circle cx="54" cy="54" r="51" stroke="rgba(129,140,248,0.2)" stroke-width="1" stroke-dasharray="3 6"/>
        <path d="M 54,3 A 51,51 0 0 1 105,54" stroke="url(#betaG)" stroke-width="2.5" stroke-linecap="round" filter="url(#bg)"/>
        <path d="M 105,54 A 51,51 0 0 1 54,105" stroke="url(#betaG)" stroke-width="2.5" stroke-linecap="round" filter="url(#bg)"/>
        <path d="M 54,105 A 51,51 0 0 1 3,54" stroke="url(#betaG)" stroke-width="2.5" stroke-linecap="round" filter="url(#bg)"/>
        <path d="M 3,54 A 51,51 0 0 1 54,3" stroke="url(#betaG)" stroke-width="2.5" stroke-linecap="round" filter="url(#bg)"/>
        <circle cx="54" cy="3" r="3.5" fill="#C084FC" filter="url(#bg)"/>
        <circle cx="105" cy="54" r="3.5" fill="#818CF8" filter="url(#bg)"/>
        <circle cx="54" cy="105" r="3.5" fill="#C084FC" filter="url(#bg)"/>
        <circle cx="3" cy="54" r="3.5" fill="#818CF8" filter="url(#bg)"/>
        <line x1="54" y1="3" x2="54" y2="-4" stroke="#C084FC" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="105" y1="54" x2="112" y2="54" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="3" y1="54" x2="-4" y2="54" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round"/>
        <text x="54" y="109" text-anchor="middle" font-size="7" font-family="Inter,sans-serif" font-weight="700" fill="#C084FC" letter-spacing="1">β</text>
      </svg>
      <div class="avatar">D</div>
    </div>
    <span class="name" style="color:#A78BFA">Beta Tester</span>
  </div>

  <!-- 2. MEMBER — copper -->
  <div class="cell">
    <div class="frame">
      <svg viewBox="0 0 108 108" fill="none">
        <defs>
          <linearGradient id="copperG" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#7C4A1A"/><stop offset="25%" stop-color="#CD7F32"/><stop offset="50%" stop-color="#E8975A"/><stop offset="75%" stop-color="#CD7F32"/><stop offset="100%" stop-color="#7C4A1A"/></linearGradient>
          <linearGradient id="copperG2" x1="108" y1="0" x2="0" y2="108" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#E8975A" stop-opacity="0.6"/><stop offset="50%" stop-color="#7C4A1A" stop-opacity="0"/><stop offset="100%" stop-color="#E8975A" stop-opacity="0.4"/></linearGradient>
        </defs>
        <circle cx="54" cy="54" r="48" stroke="url(#copperG)" stroke-width="5" fill="none"/>
        <circle cx="54" cy="54" r="48" stroke="url(#copperG2)" stroke-width="3" fill="none"/>
        <circle cx="54" cy="54" r="50.5" stroke="rgba(80,30,5,0.4)" stroke-width="1" fill="none"/>
        <circle cx="54" cy="54" r="45.5" stroke="rgba(80,30,5,0.35)" stroke-width="1" fill="none"/>
      </svg>
      <div class="avatar">D</div>
    </div>
    <span class="name" style="color:#CD7F32">Member</span>
  </div>

  <!-- 3. PREMIUM MEMBER -->
  <div class="cell">
    <div class="frame">
      <svg viewBox="0 0 108 108" fill="none">
        <defs>
          <linearGradient id="premRope" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#9A6210"/><stop offset="30%" stop-color="#F0C65A"/><stop offset="60%" stop-color="#D4A04A"/><stop offset="100%" stop-color="#9A6210"/></linearGradient>
        </defs>
        <circle cx="54" cy="54" r="48" stroke="url(#premRope)"        stroke-width="7"   stroke-dasharray="7 4.8" fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="48" stroke="rgba(15,5,0,0.72)"      stroke-width="4"   stroke-dasharray="7 4.8" stroke-dashoffset="5.9" fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="48" stroke="rgba(255,225,120,0.55)" stroke-width="2.5" stroke-dasharray="7 4.8" stroke-dashoffset="2.8" fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="51.5" stroke="rgba(154,98,16,0.3)"  stroke-width="1" fill="none"/>
        <circle cx="54" cy="54" r="44.5" stroke="rgba(154,98,16,0.25)" stroke-width="1" fill="none"/>
      </svg>
      <div class="avatar">D</div>
    </div>
    <span class="name" style="color:#D4A04A">Premium Member</span>
  </div>

  <!-- 4. TOP CONTRIBUTOR -->
  <div class="cell">
    <div class="frame">
      <svg viewBox="0 0 108 108" fill="none">
        <defs>
          <linearGradient id="tcGold" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#9A6210"/><stop offset="50%" stop-color="#F0C65A"/><stop offset="100%" stop-color="#9A6210"/></linearGradient>
          <linearGradient id="tcEmber" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#9A3412"/><stop offset="50%" stop-color="#F97316"/><stop offset="100%" stop-color="#9A3412"/></linearGradient>
        </defs>
        <circle cx="54" cy="54" r="48" stroke="url(#tcGold)"           stroke-width="5.5" stroke-dasharray="9 9"          fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="48" stroke="url(#tcEmber)"          stroke-width="5.5" stroke-dasharray="9 9" stroke-dashoffset="9"   fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="48" stroke="rgba(10,3,0,0.65)"      stroke-width="3"   stroke-dasharray="9 9" stroke-dashoffset="4.5" fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="48" stroke="rgba(255,225,100,0.35)" stroke-width="1.5" stroke-dasharray="9 9" stroke-dashoffset="2"   fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="48" stroke="rgba(255,180,80,0.25)"  stroke-width="1.5" stroke-dasharray="9 9" stroke-dashoffset="11"  fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="51" stroke="rgba(212,160,74,0.2)"  stroke-width="1" fill="none"/>
        <circle cx="54" cy="54" r="45" stroke="rgba(154,52,18,0.2)"   stroke-width="1" fill="none"/>
        <circle cx="54" cy="6"   r="4" fill="#1A1210" stroke="url(#tcGold)"  stroke-width="1.5"/>
        <circle cx="54" cy="6"   r="2" fill="#F0C65A"/>
        <circle cx="54" cy="102" r="4" fill="#1A1210" stroke="url(#tcEmber)" stroke-width="1.5"/>
        <circle cx="54" cy="102" r="2" fill="#F97316"/>
      </svg>
      <div class="avatar">D</div>
    </div>
    <span class="name" style="color:#F97316">Top Contributor</span>
  </div>

  <!-- 5. MODERATOR -->
  <div class="cell">
    <div class="frame">
      <svg viewBox="0 0 108 108" fill="none">
        <defs>
          <linearGradient id="silverRope" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#475569"/><stop offset="30%" stop-color="#F1F5F9"/><stop offset="60%" stop-color="#CBD5E1"/><stop offset="100%" stop-color="#475569"/></linearGradient>
          <linearGradient id="shieldFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CBD5E1"/><stop offset="100%" stop-color="#1E293B"/></linearGradient>
          <linearGradient id="shieldStroke" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#94A3B8"/><stop offset="50%" stop-color="#F1F5F9"/><stop offset="100%" stop-color="#64748B"/></linearGradient>
        </defs>
        <circle cx="54" cy="54" r="48" stroke="url(#silverRope)"      stroke-width="7"   stroke-dasharray="7 4.8" fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="48" stroke="rgba(10,14,20,0.72)"    stroke-width="4"   stroke-dasharray="7 4.8" stroke-dashoffset="5.9" fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="48" stroke="rgba(241,245,249,0.55)" stroke-width="2.5" stroke-dasharray="7 4.8" stroke-dashoffset="2.8" fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="54" r="51.5" stroke="rgba(71,85,105,0.3)"  stroke-width="1" fill="none"/>
        <circle cx="54" cy="54" r="44.5" stroke="rgba(71,85,105,0.25)" stroke-width="1" fill="none"/>
        <path d="M 42,90 L 42,104 Q 54,114 66,104 L 66,90 Q 60,94 54,94 Q 48,94 42,90 Z"
              fill="url(#shieldFill)" stroke="url(#shieldStroke)" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M 46,92 L 46,103 Q 54,110 62,103 L 62,92 Q 58,95 54,95 Q 50,95 46,92 Z"
              fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <path d="M 46,92 Q 48,93 50,94 L 50,104 Q 48,101 46,98 Z" fill="rgba(255,255,255,0.08)"/>
      </svg>
      <div class="avatar">D</div>
    </div>
    <span class="name" style="color:#94A3B8">Moderator</span>
  </div>

  <!-- 6. PARTNER — gold trim only, leaves removed -->
  <div class="cell">
    <div class="frame">
      <svg viewBox="0 0 108 108" fill="none">
        <defs>
          <linearGradient id="pGold" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
            <stop offset="0%"  stop-color="#9A6210"/>
            <stop offset="40%" stop-color="#F0C65A"/>
            <stop offset="100%" stop-color="#9A6210"/>
          </linearGradient>
        </defs>
        <!-- Clean gold ring -->
        <circle cx="54" cy="54" r="47" stroke="url(#pGold)" stroke-width="2" fill="none"/>
        <circle cx="54" cy="54" r="49.5" stroke="rgba(212,160,74,0.2)" stroke-width="1" fill="none"/>
        <circle cx="54" cy="54" r="44.5" stroke="rgba(154,98,16,0.2)"  stroke-width="1" fill="none"/>
        <!-- Gold stem lines -->
        <path d="M 54,101 Q 22,85 11,55" stroke="url(#pGold)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M 54,101 Q 86,85 97,55" stroke="url(#pGold)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <!-- Gold ribbon at bottom -->
        <path d="M 40,100 C 44,97 50,99 54,102 C 58,99 64,97 68,100" stroke="url(#pGold)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="54" cy="102" r="3.5" fill="#D4A04A" stroke="#9A6210" stroke-width="0.8"/>
        <!-- Small star at top -->
        <text x="54" y="6" text-anchor="middle" font-size="7" fill="#D4A04A">✦</text>
      </svg>
      <div class="avatar">D</div>
    </div>
    <span class="name" style="color:#D4A04A">Partner</span>
  </div>

</div>

<!-- ══ FOUNDER ══ -->
<hr class="divider"/>
<p class="founder-label">— Founder —</p>
<div style="display:flex;justify-content:center;">
<div class="cell">
  <div class="frame" style="width:140px;height:140px;">
    <svg viewBox="0 0 140 140" fill="none" style="width:140px;height:140px;overflow:visible;">
      <defs>
        <!-- Main gold gradient -->
        <linearGradient id="fG" x1="0" y1="0" x2="140" y2="140" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#7A4A08"/>
          <stop offset="25%"  stop-color="#F5D060"/>
          <stop offset="50%"  stop-color="#FFF0A0"/>
          <stop offset="75%"  stop-color="#E8B830"/>
          <stop offset="100%" stop-color="#7A4A08"/>
        </linearGradient>
        <!-- Opposing sheen gradient -->
        <linearGradient id="fG2" x1="140" y1="0" x2="0" y2="140" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#FFF0A0" stop-opacity="0.5"/>
          <stop offset="50%"  stop-color="#7A4A08"  stop-opacity="0"/>
          <stop offset="100%" stop-color="#FFF0A0" stop-opacity="0.3"/>
        </linearGradient>
        <!-- Emerald green (Opus X signature) -->
        <linearGradient id="fGreen" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#065F46"/>
          <stop offset="100%" stop-color="#10B981"/>
        </linearGradient>
        <!-- Gem gradients -->
        <linearGradient id="ruby" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FCA5A5"/><stop offset="100%" stop-color="#B91C1C"/></linearGradient>
        <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6EE7B7"/><stop offset="100%" stop-color="#065F46"/></linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softglow">
          <feGaussianBlur stdDeviation="1.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- ── OUTER RULE ── -->
      <circle cx="70" cy="70" r="65" stroke="url(#fG)" stroke-width="0.8" fill="none" opacity="0.6"/>

      <!-- ── ALTERNATING GOLD / GREEN ART DECO BLOCKS ──
           Inspired by the Opus X border: two-tone rectangular segments
           Gold: dasharray 5.5 5.5
           Green: same, offset 5.5 to fill the gaps
      -->
      <circle cx="70" cy="70" r="62" stroke="url(#fG)"     stroke-width="6" stroke-dasharray="5.5 5.5" stroke-linecap="butt" fill="none" filter="url(#softglow)"/>
      <circle cx="70" cy="70" r="62" stroke="url(#fGreen)"  stroke-width="6" stroke-dasharray="5.5 5.5" stroke-dashoffset="5.5" stroke-linecap="butt" fill="none"/>
      <!-- Sheen layer over both -->
      <circle cx="70" cy="70" r="62" stroke="url(#fG2)"    stroke-width="4" stroke-dasharray="11 0"     stroke-linecap="butt" fill="none"/>

      <!-- ── INNER RULE ── -->
      <circle cx="70" cy="70" r="59" stroke="url(#fG)" stroke-width="0.8" fill="none" opacity="0.5"/>

      <!-- ════════════════════════════════════
           TOP ORNAMENT — Art Deco medallion
           Centered at (70, 8), overlapping the ring
      ════════════════════════════════════ -->

      <!-- Horizontal decorative bar -->
      <line x1="34" y1="8" x2="106" y2="8" stroke="url(#fG)" stroke-width="1.2" opacity="0.8"/>

      <!-- Left scrollwork arm -->
      <!-- Main S-curve: starts at center, arcs left then curls back -->
      <path d="M 63,8 C 54,8 46,4 44,11 C 42,18 48,22 54,19 C 58,17 56,12 51,14"
            stroke="url(#fG)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <!-- Outer left curl tip -->
      <circle cx="51" cy="14" r="2" fill="url(#fG)" opacity="0.8"/>

      <!-- Right scrollwork arm (mirror) -->
      <path d="M 77,8 C 86,8 94,4 96,11 C 98,18 92,22 86,19 C 82,17 84,12 89,14"
            stroke="url(#fG)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <circle cx="89" cy="14" r="2" fill="url(#fG)" opacity="0.8"/>

      <!-- Central diamond medallion (stacked diamonds, Opus X style) -->
      <!-- Outer diamond -->
      <polygon points="70,0 78,8 70,16 62,8"
               fill="#0A0806" stroke="url(#fG)" stroke-width="1.2"/>
      <!-- Inner diamond (rotated 45°, emerald green fill) -->
      <polygon points="70,3 75,8 70,13 65,8"
               fill="url(#fGreen)" stroke="rgba(255,240,140,0.6)" stroke-width="0.6"/>
      <!-- Center gem dot -->
      <circle cx="70" cy="8" r="2.5" fill="url(#ruby)" stroke="rgba(255,240,140,0.8)" stroke-width="0.5" filter="url(#softglow)"/>
      <circle cx="70" cy="7.2" r="1" fill="rgba(255,255,255,0.55)"/>

      <!-- Small diamond accents flanking top bar -->
      <polygon points="38,8 42,4 46,8 42,12" fill="#0A0806" stroke="url(#fG)" stroke-width="0.8"/>
      <circle cx="42" cy="8" r="1.5" fill="url(#emerald)"/>
      <polygon points="94,8 98,4 102,8 98,12" fill="#0A0806" stroke="url(#fG)" stroke-width="0.8"/>
      <circle cx="98" cy="8" r="1.5" fill="url(#emerald)"/>

      <!-- ════════════════════════════════════
           BOTTOM ORNAMENT
      ════════════════════════════════════ -->

      <line x1="34" y1="132" x2="106" y2="132" stroke="url(#fG)" stroke-width="1.2" opacity="0.8"/>

      <!-- Left scroll (mirrored vertically) -->
      <path d="M 63,132 C 54,132 46,136 44,129 C 42,122 48,118 54,121 C 58,123 56,128 51,126"
            stroke="url(#fG)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <circle cx="51" cy="126" r="2" fill="url(#fG)" opacity="0.8"/>

      <!-- Right scroll -->
      <path d="M 77,132 C 86,132 94,136 96,129 C 98,122 92,118 86,121 C 82,123 84,128 89,126"
            stroke="url(#fG)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <circle cx="89" cy="126" r="2" fill="url(#fG)" opacity="0.8"/>

      <!-- Bottom diamond medallion -->
      <polygon points="70,140 78,132 70,124 62,132"
               fill="#0A0806" stroke="url(#fG)" stroke-width="1.2"/>
      <polygon points="70,137 75,132 70,127 65,132"
               fill="url(#fGreen)" stroke="rgba(255,240,140,0.6)" stroke-width="0.6"/>
      <circle cx="70" cy="132" r="2.5" fill="url(#ruby)" stroke="rgba(255,240,140,0.8)" stroke-width="0.5" filter="url(#softglow)"/>
      <circle cx="70" cy="131.2" r="1" fill="rgba(255,255,255,0.55)"/>

      <!-- Small diamond accents flanking bottom bar -->
      <polygon points="38,132 42,128 46,132 42,136" fill="#0A0806" stroke="url(#fG)" stroke-width="0.8"/>
      <circle cx="42" cy="132" r="1.5" fill="url(#emerald)"/>
      <polygon points="94,132 98,128 102,132 98,136" fill="#0A0806" stroke="url(#fG)" stroke-width="0.8"/>
      <circle cx="98" cy="132" r="1.5" fill="url(#emerald)"/>

      <!-- ════════════════════════════════════
           SIDE ORNAMENTS (3 and 9 o'clock)
      ════════════════════════════════════ -->

      <!-- Left side (x=4, y=70) -->
      <polygon points="4,70 12,62 20,70 12,78" fill="#0A0806" stroke="url(#fG)" stroke-width="1"/>
      <polygon points="4,70 10,64 16,70 10,76" fill="url(#fGreen)" stroke="rgba(255,240,140,0.4)" stroke-width="0.5"/>
      <circle cx="10" cy="70" r="2" fill="url(#ruby)" stroke="rgba(255,240,140,0.5)" stroke-width="0.4"/>

      <!-- Right side (x=136, y=70) -->
      <polygon points="136,70 128,62 120,70 128,78" fill="#0A0806" stroke="url(#fG)" stroke-width="1"/>
      <polygon points="136,70 130,64 124,70 130,76" fill="url(#fGreen)" stroke="rgba(255,240,140,0.4)" stroke-width="0.5"/>
      <circle cx="130" cy="70" r="2" fill="url(#ruby)" stroke="rgba(255,240,140,0.5)" stroke-width="0.4"/>

    </svg>
    <div class="avatar" style="width:90px;height:90px;font-size:34px;">D</div>
  </div>
  <span class="name" style="color:#FFF0A0;font-size:11px;letter-spacing:0.18em;">Founder</span>
</div>
</div>

</body>
</html>
