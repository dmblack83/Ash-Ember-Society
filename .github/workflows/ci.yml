# Typecheck gate for every PR.
#
# Runs on PRs targeting main and pushes to main. Catches real type
# regressions in client/server components, cross-file type drift in
# the SWR fetcher modules and key conventions, and SW source.
#
# Intentionally NOT in scope:
# - `npm run lint` — main has 63 pre-existing eslint errors
#   (mostly `@typescript-eslint/no-explicit-any` in older code).
#   Running lint as a hard gate here would block every PR, including
#   ones that don't touch flagged files. Better to drive lint debt
#   down in dedicated cleanup PRs first, then add lint to this gate
#   once it passes on main. New code SHOULD be lint-clean — author
#   responsibility, not CI-enforced (yet).
# - End-to-end tests — specs exist (tests/e2e); the authenticated
#   project self-skips without TEST_USER_* credentials. Run locally
#   or against preview deploys; not a CI gate yet.
#
# Production build runs ONLY inside the bundle-size job below, and
# only when the required secrets are configured — Vercel's pipeline
# remains the authoritative build check on every PR preview deploy.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-flight run on the same branch when a new commit pushes.
# Keeps the queue tidy on rapid PR iteration.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # tsc --noEmit verifies every file in tsconfig.json typechecks.
      # The SW source (app/sw.ts) is excluded from the main project
      # tsconfig because it uses the WebWorker lib; check it under
      # its own config.
      - name: Type check (project)
        run: npx tsc --noEmit

      - name: Type check (service worker)
        run: npx tsc --project tsconfig.sw.json --noEmit

      # PWA URL absoluteness — static source check. Catches the regression
      # where someone makes apple-touch-startup-image or manifest start_url
      # relative again. Fixed in fix/pwa-cold-launch-redirect-cascade after
      # bare-domain installs hit a 5-10s black screen on every cold launch.
      # See scripts/check-pwa-urls.mjs for the rule + reasoning.
      - name: PWA URL absoluteness
        run: npm run check:pwa

  # Bundle-size gate — builds the app and compares per-route
  # analyze.data + total chunk bytes against scripts/bundle-baseline.json
  # (tolerance: max(+10%, +20KB) per metric). Deliberate growth is
  # accepted by regenerating the baseline (npm run check:bundle:write)
  # in the same PR.
  #
  # ACTIVATION: requires two repository secrets so `next build` can run:
  #   NEXT_PUBLIC_SUPABASE_URL       (public value — the project URL)
  #   NEXT_PUBLIC_SUPABASE_ANON_KEY  (public anon key)
  # Until they're configured the job is skipped (the `if` below).
  # Server-only secrets are NOT needed: dummies are supplied for the
  # modules that instantiate clients at import time.
  bundle-size:
    name: Bundle-size gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when build secrets are absent
        id: gate
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::bundle-size gate skipped — configure NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY repo secrets to activate."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Build
        if: steps.gate.outputs.run == 'true'
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Dummies for modules that construct clients at import time
          # during page-data collection; nothing calls out in a build.
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role
          STRIPE_SECRET_KEY:         sk_test_dummy
          STRIPE_WEBHOOK_SECRET:     whsec_dummy

      - name: Analyze
        if: steps.gate.outputs.run == 'true'
        run: npm run analyze

      - name: Bundle-size gate
        if: steps.gate.outputs.run == 'true'
        run: npm run check:bundle

      # Bottom-nav routes must prerender as static shells — a dynamic
      # route here gets fully server-rendered by the nav's prefetch on
      # every app open (the 2026-07-06 cold-load regression, PR #557).
      - name: Static-shell gate
        if: steps.gate.outputs.run == 'true'
        run: npm run check:shells

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # Post-deploy smoke check — runs on push to main only, against the live
  # production URLs. Verifies PWA-critical static assets serve 200 from
  # BOTH hosts (bare ashember.vip + www.ashember.vip). If the bare-domain
  # redirect ever becomes catch-all again (re-broken next.config.ts), this
  # job fails and we know within minutes of the deploy.
  #
  # Splash URL chosen: iPhone 16 Pro (1206x2622). Any committed splash file
  # would work; this one is the most common modern iPhone.
  pwa-smoke:
    name: PWA URL smoke (prod)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 3
    needs: typecheck

    steps:
      - name: Splash image — bare host returns 200
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ashember.vip/appstore-images/ios-splash/1206x2622.png")
          if [ "$code" != "200" ]; then
            echo "::error::bare host splash returned $code (expected 200). Bare-domain redirect may have re-caught static assets."
            exit 1
          fi
          echo "OK: bare host splash → 200"

      - name: Splash image — www host returns 200
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.ashember.vip/appstore-images/ios-splash/1206x2622.png")
          if [ "$code" != "200" ]; then
            echo "::error::www host splash returned $code (expected 200)."
            exit 1
          fi
          echo "OK: www host splash → 200"

      - name: Manifest — bare host returns 200
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ashember.vip/manifest.webmanifest")
          if [ "$code" != "200" ]; then
            echo "::error::bare host manifest returned $code (expected 200)."
            exit 1
          fi
          echo "OK: bare host manifest → 200"

      - name: Manifest — www host returns 200
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.ashember.vip/manifest.webmanifest")
          if [ "$code" != "200" ]; then
            echo "::error::www host manifest returned $code (expected 200)."
            exit 1
          fi
          echo "OK: www host manifest → 200"

  # SW precache cookieless-200 gate — runs on push to main, against
  # the live production SW. Verifies every URL in the deployed precache
  # manifest returns 200 from a cookieless context. Catches the regression
  # where an auth-gated route or admin file in public/ gets auto-included
  # in the Serwist precache manifest, hangs SW install, and times out
  # push subscriptions at 120s.
  #
  # The exact bug this gates: PR #472's diagnostic showed SW stuck in
  # "installing" because /public/badge-preview returned 401 cookieless.
  # Six prior PRs targeted the symptom from different angles without
  # detecting the actual cause.
  sw-precache-check:
    name: SW precache cookieless-200 gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 3
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify every precache URL returns 200 cookieless
        run: node scripts/check-sw-precache.mjs
        env:
          SW_PRECACHE_BASE_URL: https://www.ashember.vip
